<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Minecraft 皮肤 72 分区编辑器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; padding: 20px; }
        
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .editor-panel {
            flex: 1;
            min-width: 400px;
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
            color: white;
        }
        
        .preview-panel {
            flex: 1;
            min-width: 400px;
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
        }
        
        .canvas-container {
            background: #0f0f1a;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }
        
        canvas {
            background: #2d2d44;
            border-radius: 8px;
            cursor: crosshair;
            max-width: 100%;
            height: auto;
        }
        
        .region-list {
            max-height: 500px;
            overflow-y: auto;
            margin-top: 15px;
        }
        
        .region-item {
            background: #0f0f1a;
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .region-item:hover { background: #1a1a3e; }
        .region-item.selected { background: #007bff; color: white; }
        
        .coord-input {
            background: #0f0f1a;
            border: 1px solid #333;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            width: 60px;
            text-align: center;
        }
        
        .export-btn {
            background: #28a745;
            margin-top: 15px;
        }
        .export-btn:hover { background: #218838; }
        
        .coord-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .coord-group label { font-size: 10px; margin-right: 2px; }
        
        .status-bar {
            margin-top: 15px;
            padding: 10px;
            background: #0f0f1a;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #007bff; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 左侧：分区编辑器 -->
        <div class="editor-panel">
            <h2>📐 72 分区编辑器</h2>
            <p style="font-size: 12px; color: #aaa; margin-bottom: 15px;">点击区域选择 | 拖拽滑块调整坐标 | 实时预览</p>
            
            <div class="region-list" id="regionList"></div>
            
            <button id="exportCodeBtn" class="export-btn">📋 导出修正代码</button>
            <div class="status-bar" id="statusBar">
                💡 点击上方区域，然后调整坐标
            </div>
        </div>
        
        <!-- 右侧：预览画布 -->
        <div class="preview-panel">
            <h2>🖼️ 皮肤布局预览</h2>
            <div class="canvas-container">
                <canvas id="skinCanvas" width="512" height="512"></canvas>
            </div>
            <div style="margin-top: 15px; display: flex; gap: 10px;">
                <input type="file" id="uploadSkin" accept="image/png">
                <button id="resetBtn">重置所有坐标</button>
            </div>
            <p style="font-size: 12px; color: #aaa; margin-top: 15px;">
                🎯 点击区域 = 选中 | 🖱️ 拖拽滑块 = 移动区域 | 🔴 红色框 = 当前选中区域
            </p>
        </div>
    </div>

    <script>
        // ========== 72 个分区的定义（标准 Minecraft 64x64 坐标）==========
        // 坐标格式: { x, y, w, h }
        // 头部区域 (y: 0-16)
        const regions = {
            // --- 头内层 ---
            '头正面内层': { x: 8, y: 8, w: 8, h: 8, category: '头内层', group: 'head' },
            '头背面内层': { x: 24, y: 8, w: 8, h: 8, category: '头内层', group: 'head' },
            '头左侧内层': { x: 0, y: 8, w: 8, h: 8, category: '头内层', group: 'head' },
            '头右侧内层': { x: 16, y: 8, w: 8, h: 8, category: '头内层', group: 'head' },
            '头顶内层':    { x: 8, y: 0, w: 8, h: 8, category: '头内层', group: 'head' },
            '头底内层':    { x: 16, y: 0, w: 8, h: 8, category: '头内层', group: 'head' },
            // --- 头外层（帽子）---
            '头正面外层': { x: 8, y: 40, w: 8, h: 8, category: '头外层', group: 'hat' },
            '头背面外层': { x: 24, y: 40, w: 8, h: 8, category: '头外层', group: 'hat' },
            '头左侧外层': { x: 0, y: 40, w: 8, h: 8, category: '头外层', group: 'hat' },
            '头右侧外层': { x: 16, y: 40, w: 8, h: 8, category: '头外层', group: 'hat' },
            '头顶外层':    { x: 8, y: 32, w: 8, h: 8, category: '头外层', group: 'hat' },
            '头底外层':    { x: 16, y: 32, w: 8, h: 8, category: '头外层', group: 'hat' },
            
            // --- 身体内层 (y: 16-32) ---
            '身体正面内层': { x: 20, y: 20, w: 8, h: 12, category: '身体内层', group: 'body' },
            '身体背面内层': { x: 28, y: 20, w: 8, h: 12, category: '身体内层', group: 'body' },
            '身体左侧内层': { x: 16, y: 20, w: 4, h: 12, category: '身体内层', group: 'body' },
            '身体右侧内层': { x: 24, y: 20, w: 4, h: 12, category: '身体内层', group: 'body' },
            '身体顶面内层': { x: 20, y: 16, w: 8, h: 4, category: '身体内层', group: 'body' },
            '身体底面内层': { x: 20, y: 32, w: 8, h: 4, category: '身体内层', group: 'body' },
            // --- 身体外层 (外套) ---
            '身体正面外层': { x: 20, y: 52, w: 8, h: 12, category: '身体外层', group: 'jacket' },
            '身体背面外层': { x: 28, y: 52, w: 8, h: 12, category: '身体外层', group: 'jacket' },
            '身体左侧外层': { x: 16, y: 52, w: 4, h: 12, category: '身体外层', group: 'jacket' },
            '身体右侧外层': { x: 24, y: 52, w: 4, h: 12, category: '身体外层', group: 'jacket' },
            '身体顶面外层': { x: 20, y: 48, w: 8, h: 4, category: '身体外层', group: 'jacket' },
            '身体底面外层': { x: 20, y: 64, w: 8, h: 4, category: '身体外层', group: 'jacket' },
            
            // --- 右臂内层 (x: 40-44) ---
            '右臂正面内层': { x: 40, y: 20, w: 4, h: 12, category: '右臂内层', group: 'rightArm' },
            '右臂背面内层': { x: 44, y: 20, w: 4, h: 12, category: '右臂内层', group: 'rightArm' },
            '右臂左侧内层': { x: 36, y: 20, w: 4, h: 12, category: '右臂内层', group: 'rightArm' },
            '右臂右侧内层': { x: 48, y: 20, w: 4, h: 12, category: '右臂内层', group: 'rightArm' },
            '右臂顶面内层': { x: 40, y: 16, w: 4, h: 4, category: '右臂内层', group: 'rightArm' },
            '右臂底面内层': { x: 40, y: 32, w: 4, h: 4, category: '右臂内层', group: 'rightArm' },
            // --- 右臂外层 (袖子) ---
            '右臂正面外层': { x: 40, y: 52, w: 4, h: 12, category: '右臂外层', group: 'rightSleeve' },
            '右臂背面外层': { x: 44, y: 52, w: 4, h: 12, category: '右臂外层', group: 'rightSleeve' },
            '右臂左侧外层': { x: 36, y: 52, w: 4, h: 12, category: '右臂外层', group: 'rightSleeve' },
            '右臂右侧外层': { x: 48, y: 52, w: 4, h: 12, category: '右臂外层', group: 'rightSleeve' },
            '右臂顶面外层': { x: 40, y: 48, w: 4, h: 4, category: '右臂外层', group: 'rightSleeve' },
            '右臂底面外层': { x: 40, y: 64, w: 4, h: 4, category: '右臂外层', group: 'rightSleeve' },
            
            // --- 左臂内层 (x: 36-40) ---
            '左臂正面内层': { x: 36, y: 20, w: 4, h: 12, category: '左臂内层', group: 'leftArm' },
            '左臂背面内层': { x: 32, y: 20, w: 4, h: 12, category: '左臂内层', group: 'leftArm' },
            '左臂左侧内层': { x: 28, y: 20, w: 4, h: 12, category: '左臂内层', group: 'leftArm' },
            '左臂右侧内层': { x: 40, y: 20, w: 4, h: 12, category: '左臂内层', group: 'leftArm' },
            '左臂顶面内层': { x: 36, y: 16, w: 4, h: 4, category: '左臂内层', group: 'leftArm' },
            '左臂底面内层': { x: 36, y: 32, w: 4, h: 4, category: '左臂内层', group: 'leftArm' },
            // --- 左臂外层 (袖子) ---
            '左臂正面外层': { x: 36, y: 52, w: 4, h: 12, category: '左臂外层', group: 'leftSleeve' },
            '左臂背面外层': { x: 32, y: 52, w: 4, h: 12, category: '左臂外层', group: 'leftSleeve' },
            '左臂左侧外层': { x: 28, y: 52, w: 4, h: 12, category: '左臂外层', group: 'leftSleeve' },
            '左臂右侧外层': { x: 40, y: 52, w: 4, h: 12, category: '左臂外层', group: 'leftSleeve' },
            '左臂顶面外层': { x: 36, y: 48, w: 4, h: 4, category: '左臂外层', group: 'leftSleeve' },
            '左臂底面外层': { x: 36, y: 64, w: 4, h: 4, category: '左臂外层', group: 'leftSleeve' },
            
            // --- 右腿内层 (x: 4-8) ---
            '右腿正面内层': { x: 4, y: 20, w: 4, h: 12, category: '右腿内层', group: 'rightLeg' },
            '右腿背面内层': { x: 8, y: 20, w: 4, h: 12, category: '右腿内层', group: 'rightLeg' },
            '右腿左侧内层': { x: 0, y: 20, w: 4, h: 12, category: '右腿内层', group: 'rightLeg' },
            '右腿右侧内层': { x: 12, y: 20, w: 4, h: 12, category: '右腿内层', group: 'rightLeg' },
            '右腿顶面内层': { x: 4, y: 16, w: 4, h: 4, category: '右腿内层', group: 'rightLeg' },
            '右腿底面内层': { x: 4, y: 32, w: 4, h: 4, category: '右腿内层', group: 'rightLeg' },
            // --- 右腿外层 (裤腿) ---
            '右腿正面外层': { x: 4, y: 52, w: 4, h: 12, category: '右腿外层', group: 'rightPants' },
            '右腿背面外层': { x: 8, y: 52, w: 4, h: 12, category: '右腿外层', group: 'rightPants' },
            '右腿左侧外层': { x: 0, y: 52, w: 4, h: 12, category: '右腿外层', group: 'rightPants' },
            '右腿右侧外层': { x: 12, y: 52, w: 4, h: 12, category: '右腿外层', group: 'rightPants' },
            '右腿顶面外层': { x: 4, y: 48, w: 4, h: 4, category: '右腿外层', group: 'rightPants' },
            '右腿底面外层': { x: 4, y: 64, w: 4, h: 4, category: '右腿外层', group: 'rightPants' },
            
            // --- 左腿内层 (x: 0-4) ---
            '左腿正面内层': { x: 0, y: 20, w: 4, h: 12, category: '左腿内层', group: 'leftLeg' },
            '左腿背面内层': { x: 4, y: 20, w: 4, h: 12, category: '左腿内层', group: 'leftLeg' },
            '左腿左侧内层': { x: -4, y: 20, w: 4, h: 12, category: '左腿内层', group: 'leftLeg' },
            '左腿右侧内层': { x: 8, y: 20, w: 4, h: 12, category: '左腿内层', group: 'leftLeg' },
            '左腿顶面内层': { x: 0, y: 16, w: 4, h: 4, category: '左腿内层', group: 'leftLeg' },
            '左腿底面内层': { x: 0, y: 32, w: 4, h: 4, category: '左腿内层', group: 'leftLeg' },
            // --- 左腿外层 (裤腿) ---
            '左腿正面外层': { x: 0, y: 52, w: 4, h: 12, category: '左腿外层', group: 'leftPants' },
            '左腿背面外层': { x: 4, y: 52, w: 4, h: 12, category: '左腿外层', group: 'leftPants' },
            '左腿左侧外层': { x: -4, y: 52, w: 4, h: 12, category: '左腿外层', group: 'leftPants' },
            '左腿右侧外层': { x: 8, y: 52, w: 4, h: 12, category: '左腿外层', group: 'leftPants' },
            '左腿顶面外层': { x: 0, y: 48, w: 4, h: 4, category: '左腿外层', group: 'leftPants' },
            '左腿底面外层': { x: 0, y: 64, w: 4, h: 4, category: '左腿外层', group: 'leftPants' }
        };
        
        let currentSkinImage = null;
        let selectedRegion = null;
        let canvas = document.getElementById('skinCanvas');
        let ctx = canvas.getContext('2d');
        
        // 初始化画布
        function initCanvas() {
            canvas.width = 512;
            canvas.height = 512;
            drawGrid();
        }
        
        function drawGrid() {
            ctx.fillStyle = '#2d2d44';
            ctx.fillRect(0, 0, 512, 512);
            
            // 绘制网格线（每 8 像素一条，放大 8 倍 = 64px 一格）
            ctx.strokeStyle = '#4a4a6a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 64; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 8, 0);
                ctx.lineTo(i * 8, 512);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * 8);
                ctx.lineTo(512, i * 8);
                ctx.stroke();
            }
            
            // 绘制所有区域
            for (let [name, region] of Object.entries(regions)) {
                const x = region.x * 8;
                const y = region.y * 8;
                const w = region.w * 8;
                const h = region.h * 8;
                
                if (selectedRegion === name) {
                    ctx.strokeStyle = '#ff4444';
                    ctx.lineWidth = 3;
                } else {
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 1;
                }
                ctx.strokeRect(x, y, w, h);
                
                // 显示区域名称缩写
                ctx.font = '8px monospace';
                ctx.fillStyle = '#aaa';
                ctx.fillText(name.substring(0, 4), x + 2, y + 10);
            }
        }
        
        // 加载皮肤图片
        function loadSkinImage(imgElement) {
            ctx.drawImage(imgElement, 0, 0, 512, 512);
            drawGrid();
        }
        
        // 上传皮肤
        document.getElementById('uploadSkin').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        currentSkinImage = img;
                        loadSkinImage(img);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 生成区域列表
        function buildRegionList() {
            const container = document.getElementById('regionList');
            const categoryOrder = ['头内层', '头外层', '身体内层', '身体外层', '右臂内层', '右臂外层', '左臂内层', '左臂外层', '右腿内层', '右腿外层', '左腿内层', '左腿外层'];
            
            let html = '';
            for (let cat of categoryOrder) {
                html += `<div style="margin-top: 10px; margin-bottom: 5px; font-weight: bold; color: #4caf50;">📁 ${cat}</div>`;
                for (let [name, region] of Object.entries(regions)) {
                    if (region.category === cat) {
                        const isSelected = selectedRegion === name;
                        html += `
                            <div class="region-item ${isSelected ? 'selected' : ''}" data-name="${name}">
                                <span>${name}</span>
                                <div class="coord-group">
                                    <label>X:</label>
                                    <input type="number" class="coord-input" data-field="x" value="${region.x}" step="1" style="width:50px">
                                    <label>Y:</label>
                                    <input type="number" class="coord-input" data-field="y" value="${region.y}" step="1" style="width:50px">
                                    <label>W:</label>
                                    <input type="number" class="coord-input" data-field="w" value="${region.w}" step="1" style="width:50px">
                                    <label>H:</label>
                                    <input type="number" class="coord-input" data-field="h" value="${region.h}" step="1" style="width:50px">
                                </div>
                            </div>
                        `;
                    }
                }
            }
            container.innerHTML = html;
            
            // 绑定事件
            document.querySelectorAll('.region-item').forEach(el => {
                const name = el.dataset.name;
                el.addEventListener('click', (e) => {
                    if (e.target.classList.contains('coord-input')) return;
                    selectedRegion = name;
                    document.querySelectorAll('.region-item').forEach(item => item.classList.remove('selected'));
                    el.classList.add('selected');
                    drawGrid();
                    if (currentSkinImage) loadSkinImage(currentSkinImage);
                    document.getElementById('statusBar').innerHTML = `✅ 已选中: ${name} | 可调整坐标`;
                });
                
                // 坐标输入事件
                const inputs = el.querySelectorAll('.coord-input');
                inputs.forEach(input => {
                    input.addEventListener('change', (e) => {
                        const field = input.dataset.field;
                        const newValue = parseInt(input.value);
                        if (!isNaN(newValue) && regions[name]) {
                            regions[name][field] = newValue;
                            if (selectedRegion === name) {
                                drawGrid();
                                if (currentSkinImage) loadSkinImage(currentSkinImage);
                            }
                            document.getElementById('statusBar').innerHTML = `✏️ 已更新: ${name}.${field} = ${newValue}`;
                        }
                    });
                });
            });
        }
        
        // 导出代码
        document.getElementById('exportCodeBtn').addEventListener('click', () => {
            let codeOutput = `// 修正后的 72 分区坐标\nconst skinRegions = {\n`;
            for (let [name, region] of Object.entries(regions)) {
                codeOutput += `    "${name}": { x: ${region.x}, y: ${region.y}, w: ${region.w}, h: ${region.h} },\n`;
            }
            codeOutput += `};\n\n// 复制这段代码替换到 Three.js 的 getFaceMaterial 调用中`;
            
            // 复制到剪贴板
            navigator.clipboard.writeText(codeOutput);
            document.getElementById('statusBar').innerHTML = '📋 代码已复制到剪贴板！';
            setTimeout(() => {
                document.getElementById('statusBar').innerHTML = '💡 点击区域，然后调整坐标';
            }, 2000);
        });
        
        // 重置
        document.getElementById('resetBtn').addEventListener('click', () => {
            location.reload();
        });
        
        // 初始化
        initCanvas();
        buildRegionList();
        
        // 添加默认皮肤（纯色测试图）
        const defaultImg = new Image();
        defaultImg.onload = () => {
            currentSkinImage = defaultImg;
            loadSkinImage(defaultImg);
        };
        defaultImg.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAZdEVYdFNvZnR3YXJlAHBhaW50Lm5ldCA0LjAuMTM0A1t6AAAAAElFTkSuQmCC';
    </script>
</body>
</html>
