<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Minecraft 皮肤分区编辑器 - Steve/Alex 正确分区</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #1a1a2e; 
            padding: 20px;
        }
        
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .editor-layout {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .canvas-area {
            flex: 2;
            min-width: 550px;
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
        }
        
        .controls-area {
            flex: 1;
            min-width: 300px;
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
            color: white;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .canvas-container {
            background: #0f0f1a;
            border-radius: 12px;
            padding: 10px;
            position: relative;
            overflow: auto;
            text-align: center;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            cursor: crosshair;
            background: #2d2d44;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .toolbar {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .toolbar button {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .toolbar button:hover { background: #0056b3; }
        .toolbar button.active { background: #28a745; }
        
        .model-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background: #0f0f1a;
            border-radius: 12px;
        }
        .model-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            background: #1a1a2e;
            color: white;
            transition: all 0.2s;
        }
        .model-btn.selected {
            background: #007bff;
        }
        .model-btn:hover { opacity: 0.8; }
        
        .region-list {
            margin-top: 15px;
        }
        
        .region-group {
            margin-bottom: 15px;
            border-top: 1px solid #2d2d44;
            padding-top: 10px;
        }
        
        .region-group-title {
            font-weight: bold;
            color: #4caf50;
            margin-bottom: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .region-group-title:hover { opacity: 0.8; }
        
        .region-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .region-btn {
            background: #0f0f1a;
            border: 1px solid #333;
            color: #ccc;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .region-btn:hover { background: #1a1a3e; border-color: #007bff; }
        .region-btn.selected { background: #007bff; color: white; border-color: #007bff; }
        
        .info-panel {
            margin-top: 15px;
            padding: 12px;
            background: #0f0f1a;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
        }
        
        .info-panel div { margin: 5px 0; }
        
        .coord-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .coord-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #0f0f1a;
            padding: 5px 10px;
            border-radius: 6px;
        }
        
        .coord-item label { font-size: 12px; color: #aaa; }
        .coord-item input {
            background: #1a1a2e;
            border: 1px solid #333;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            width: 55px;
            text-align: center;
        }
        
        .status-bar {
            margin-top: 12px;
            padding: 8px;
            background: #0f0f1a;
            border-radius: 6px;
            font-size: 12px;
            color: #4caf50;
        }
        
        .export-btn {
            background: #28a745;
            width: 100%;
            margin-top: 15px;
        }
        .export-btn:hover { background: #218838; }
        
        .zoom-control {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .zoom-control button {
            background: #0f0f1a;
            padding: 4px 12px;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #007bff; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>🎨 Minecraft 皮肤分区编辑器 — Steve / Alex</h1>
        
        <div class="editor-layout">
            <div class="canvas-area">
                <div class="toolbar">
                    <button id="uploadBtn">📁 上传皮肤</button>
                    <input type="file" id="fileInput" accept="image/png" style="display:none">
                    <button id="resetViewBtn">🔄 重置视图</button>
                    <button id="toggleGridBtn" class="active">🔲 显示网格</button>
                </div>
                <div class="model-switch">
                    <div id="steveModelBtn" class="model-btn selected">🧔 Steve 模型<br><span style="font-size:10px">手臂 4px 宽</span></div>
                    <div id="alexModelBtn" class="model-btn">👧 Alex 模型<br><span style="font-size:10px">手臂 3px 宽</span></div>
                </div>
                <div class="zoom-control">
                    <span style="color:white;">🔍 缩放:</span>
                    <button id="zoomOutBtn">-</button>
                    <span id="zoomLevel" style="color:white; width:50px; text-align:center">100%</span>
                    <button id="zoomInBtn">+</button>
                    <button id="fitViewBtn">📐 适应画布</button>
                </div>
                <div class="canvas-container" id="canvasContainer">
                    <canvas id="skinCanvas" width="512" height="512"></canvas>
                </div>
                <div class="info-panel">
                    <div>💡 <strong>操作说明</strong></div>
                    <div>• 点击 <span style="color:#ff4444;">Steve/Alex</span> 按钮切换模型分区</div>
                    <div>• <span style="color:#ff4444;">红色框</span> = 当前选中的区域</div>
                    <div>• <span style="color:#00ff00;">绿色框</span> = 其他区域</div>
                    <div>• <strong>鼠标拖拽</strong> = 移动选中区域</div>
                    <div>• <strong>Shift + 拖拽</strong> = 调整区域大小</div>
                </div>
            </div>
            
            <div class="controls-area">
                <h3 style="margin-bottom: 15px;">📋 区域列表</h3>
                <div class="region-list" id="regionList"></div>
                
                <div class="coord-group" id="coordPanel">
                    <div class="coord-item"><label>X:</label><input type="number" id="coordX" step="1"></div>
                    <div class="coord-item"><label>Y:</label><input type="number" id="coordY" step="1"></div>
                    <div class="coord-item"><label>W:</label><input type="number" id="coordW" step="1"></div>
                    <div class="coord-item"><label>H:</label><input type="number" id="coordH" step="1"></div>
                </div>
                
                <button id="exportBtn" class="export-btn">📋 导出当前模型代码</button>
                <div class="status-bar" id="statusBar">✅ 选择一个区域，然后拖拽移动 | Shift+拖拽调整大小</div>
            </div>
        </div>
    </div>

    <script>
        // ========== Steve 模型（粗壮手臂 4px）正确分区 ==========
        const steveRegions = {
            // 头内层
            '头正面内层': { x: 8, y: 8, w: 8, h: 8, group: 'head' },

            '身体背面内层': { x: 28, y: 20, w: 8, h: 12, group: 'body' },
            '身体左侧内层': { x: 16, y: 20, w: 4, h: 12, group: 'body' },
            '身体右侧内层': { x: 24, y: 20, w: 4, h: 12, group: 'body' },
            '身体顶面内层': { x: 20, y: 16, w: 8, h: 4, group: 'body' },
            '身体底面内层': { x: 20, y: 32, w: 8, h: 4, group: 'body' },
            // 身体外层（外套）
            '身体正面外层': { x: 20, y: 52, w: 8, h: 12, group: 'jacket' },
            '身体背面外层': { x: 28, y: 52, w: 8, h: 12, group: 'jacket' },
            '身体左侧外层': { x: 16, y: 52, w: 4, h: 12, group: 'jacket' },
            '身体右侧外层': { x: 24, y: 52, w: 4, h: 12, group: 'jacket' },
            '身体顶面外层': { x: 20, y: 48, w: 8, h: 4, group: 'jacket' },
            '身体底面外层': { x: 20, y: 64, w: 8, h: 4, group: 'jacket' },
            // 右臂内层 (Steve: 4px 宽)
            '右臂正面内层': { x: 40, y: 20, w: 4, h: 12, group: 'rightArm' },
            '右臂背面内层': { x: 44, y: 20, w: 4, h: 12, group: 'rightArm' },
            '右臂左侧内层': { x: 36, y: 20, w: 4, h: 12, group: 'rightArm' },
            '右臂右侧内层': { x: 48, y: 20, w: 4, h: 12, group: 'rightArm' },
            '右臂顶面内层': { x: 40, y: 16, w: 4, h: 4, group: 'rightArm' },
            '右臂底面内层': { x: 40, y: 32, w: 4, h: 4, group: 'rightArm' },
            // 右臂外层（袖子）
            '右臂正面外层': { x: 40, y: 52, w: 4, h: 12, group: 'rightSleeve' },
            '右臂背面外层': { x: 44, y: 52, w: 4, h: 12, group: 'rightSleeve' },
            '右臂左侧外层': { x: 36, y: 52, w: 4, h: 12, group: 'rightSleeve' },
            '右臂右侧外层': { x: 48, y: 52, w: 4, h: 12, group: 'rightSleeve' },
            '右臂顶面外层': { x: 40, y: 48, w: 4, h: 4, group: 'rightSleeve' },
            '右臂底面外层': { x: 40, y: 64, w: 4, h: 4, group: 'rightSleeve' },
            // 左臂内层 (Steve: 4px 宽)
            '左臂正面内层': { x: 36, y: 20, w: 4, h: 12, group: 'leftArm' },
            '左臂背面内层': { x: 32, y: 20, w: 4, h: 12, group: 'leftArm' },
            '左臂左侧内层': { x: 28, y: 20, w: 4, h: 12, group: 'leftArm' },
            '左臂右侧内层': { x: 40, y: 20, w: 4, h: 12, group: 'leftArm' },
            '左臂顶面内层': { x: 36, y: 16, w: 4, h: 4, group: 'leftArm' },
            '左臂底面内层': { x: 36, y: 32, w: 4, h: 4, group: 'leftArm' },
            // 左臂外层（袖子）
            '左臂正面外层': { x: 36, y: 52, w: 4, h: 12, group: 'leftSleeve' },
            '左臂背面外层': { x: 32, y: 52, w: 4, h: 12, group: 'leftSleeve' },
            '左臂左侧外层': { x: 28, y: 52, w: 4, h: 12, group: 'leftSleeve' },
            '左臂右侧外层': { x: 40, y: 52, w: 4, h: 12, group: 'leftSleeve' },
            '左臂顶面外层': { x: 36, y: 48, w: 4, h: 4, group: 'leftSleeve' },
            '左臂底面外层': { x: 36, y: 64, w: 4, h: 4, group: 'leftSleeve' },
            // 右腿内层
            '右腿正面内层': { x: 4, y: 20, w: 4, h: 12, group: 'rightLeg' },
            '右腿背面内层': { x: 8, y: 20, w: 4, h: 12, group: 'rightLeg' },
            '右腿左侧内层': { x: 0, y: 20, w: 4, h: 12, group: 'rightLeg' },
            '右腿右侧内层': { x: 12, y: 20, w: 4, h: 12, group: 'rightLeg' },
            '右腿顶面内层': { x: 4, y: 16, w: 4, h: 4, group: 'rightLeg' },
            '右腿底面内层': { x: 4, y: 32, w: 4, h: 4, group: 'rightLeg' },
            // 右腿外层
            '右腿正面外层': { x: 4, y: 52, w: 4, h: 12, group: 'rightPants' },
            '右腿背面外层': { x: 8, y: 52, w: 4, h: 12, group: 'rightPants' },
            '右腿左侧外层': { x: 0, y: 52, w: 4, h: 12, group: 'rightPants' },
            '右腿右侧外层': { x: 12, y: 52, w: 4, h: 12, group: 'rightPants' },
            '右腿顶面外层': { x: 4, y: 48, w: 4, h: 4, group: 'rightPants' },
            '右腿底面外层': { x: 4, y: 64, w: 4, h: 4, group: 'rightPants' },
            // 左腿内层
            '左腿正面内层': { x: 0, y: 20, w: 4, h: 12, group: 'leftLeg' },
            '左腿背面内层': { x: 4, y: 20, w: 4, h: 12, group: 'leftLeg' },
            '左腿左侧内层': { x: -4, y: 20, w: 4, h: 12, group: 'leftLeg' },
            '左腿右侧内层': { x: 8, y: 20, w: 4, h: 12, group: 'leftLeg' },
            '左腿顶面内层': { x: 0, y: 16, w: 4, h: 4, group: 'leftLeg' },
            '左腿底面内层': { x: 0, y: 32, w: 4, h: 4, group: 'leftLeg' },
            // 左腿外层
            '左腿正面外层': { x: 0, y: 52, w: 4, h: 12, group: 'leftPants' },
            '左腿背面外层': { x: 4, y: 52, w: 4, h: 12, group: 'leftPants' },
            '左腿左侧外层': { x: -4, y: 52, w: 4, h: 12, group: 'leftPants' },
            '左腿右侧外层': { x: 8, y: 52, w: 4, h: 12, group: 'leftPants' },
            '左腿顶面外层': { x: 0, y: 48, w: 4, h: 4, group: 'leftPants' },
            '左腿底面外层': { x: 0, y: 64, w: 4, h: 4, group: 'leftPants' }
        };
        
        // ========== Alex 模型（纤细手臂 3px 宽）正确分区 ==========
        // 继承 Steve 的所有分区，只修改手臂相关坐标
        const alexRegions = JSON.parse(JSON.stringify(steveRegions));
        
        // 修改右臂内层 (Alex: 3px 宽)
        alexRegions['右臂正面内层'] = { x: 40, y: 20, w: 3, h: 12, group: 'rightArm' };
        alexRegions['右臂背面内层'] = { x: 43, y: 20, w: 3, h: 12, group: 'rightArm' };
        alexRegions['右臂左侧内层'] = { x: 36, y: 20, w: 4, h: 12, group: 'rightArm' };
        alexRegions['右臂右侧内层'] = { x: 43, y: 20, w: 1, h: 12, group: 'rightArm' };
        alexRegions['右臂顶面内层'] = { x: 40, y: 16, w: 3, h: 4, group: 'rightArm' };
        alexRegions['右臂底面内层'] = { x: 40, y: 32, w: 3, h: 4, group: 'rightArm' };
        
        // 修改右臂外层 (Alex: 3px 宽)
        alexRegions['右臂正面外层'] = { x: 40, y: 52, w: 3, h: 12, group: 'rightSleeve' };
        alexRegions['右臂背面外层'] = { x: 43, y: 52, w: 3, h: 12, group: 'rightSleeve' };
        alexRegions['右臂左侧外层'] = { x: 36, y: 52, w: 4, h: 12, group: 'rightSleeve' };
        alexRegions['右臂右侧外层'] = { x: 43, y: 52, w: 1, h: 12, group: 'rightSleeve' };
        alexRegions['右臂顶面外层'] = { x: 40, y: 48, w: 3, h: 4, group: 'rightSleeve' };
        alexRegions['右臂底面外层'] = { x: 40, y: 64, w: 3, h: 4, group: 'rightSleeve' };
        
        // 修改左臂内层 (Alex: 3px 宽)
        alexRegions['左臂正面内层'] = { x: 36, y: 20, w: 3, h: 12, group: 'leftArm' };
        alexRegions['左臂背面内层'] = { x: 39, y: 20, w: 3, h: 12, group: 'leftArm' };
        alexRegions['左臂左侧内层'] = { x: 32, y: 20, w: 4, h: 12, group: 'leftArm' };
        alexRegions['左臂右侧内层'] = { x: 39, y: 20, w: 1, h: 12, group: 'leftArm' };
        alexRegions['左臂顶面内层'] = { x: 36, y: 16, w: 3, h: 4, group: 'leftArm' };
        alexRegions['左臂底面内层'] = { x: 36, y: 32, w: 3, h: 4, group: 'leftArm' };
        
        // 修改左臂外层 (Alex: 3px 宽)
        alexRegions['左臂正面外层'] = { x: 36, y: 52, w: 3, h: 12, group: 'leftSleeve' };
        alexRegions['左臂背面外层'] = { x: 39, y: 52, w: 3, h: 12, group: 'leftSleeve' };
        alexRegions['左臂左侧外层'] = { x: 32, y: 52, w: 4, h: 12, group: 'leftSleeve' };
        alexRegions['左臂右侧外层'] = { x: 39, y: 52, w: 1, h: 12, group: 'leftSleeve' };
        alexRegions['左臂顶面外层'] = { x: 36, y: 48, w: 3, h: 4, group: 'leftSleeve' };
        alexRegions['左臂底面外层'] = { x: 36, y: 64, w: 3, h: 4, group: 'leftSleeve' };
        
        // 当前使用的分区
        let currentRegions = steveRegions;
        let currentModel = 'steve';
        let currentImage = null;
        let selectedName = '头正面内层';
        let showGrid = true;
        
        // 拖拽状态
        let isDragging = false;
        let isResizing = false;
        let dragStartX = 0, dragStartY = 0;
        let dragStartRegion = null;
        
        let canvas = document.getElementById('skinCanvas');
        let ctx = canvas.getContext('2d');
        
        function initCanvas() {
            canvas.width = 512;
            canvas.height = 512;
            drawFull();
        }
        
        function drawBackground() {
            if (currentImage) {
                ctx.drawImage(currentImage, 0, 0, 512, 512);
            } else {
                ctx.fillStyle = '#2d2d44';
                ctx.fillRect(0, 0, 512, 512);
                ctx.fillStyle = '#3d3d5e';
                for (let i = 0; i < 64; i++) {
                    for (let j = 0; j < 64; j++) {
                        if ((i + j) % 2 === 0) {
                            ctx.fillRect(i * 8, j * 8, 8, 8);
                        }
                    }
                }
            }
        }
        
        function drawAllBoxes() {
            for (let [name, region] of Object.entries(currentRegions)) {
                const x = region.x * 8;
                const y = region.y * 8;
                const w = region.w * 8;
                const h = region.h * 8;
                
                if (name === selectedName) {
                    ctx.strokeStyle = '#ff4444';
                    ctx.lineWidth = 3;
                } else {
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 1.5;
                }
                ctx.strokeRect(x, y, w, h);
                
                if (w >= 16 && h >= 16) {
                    ctx.font = 'bold 8px monospace';
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 2;
                    ctx.fillText(name.substring(0, 6), x + 2, y + 10);
                    ctx.shadowBlur = 0;
                }
            }
        }
        
        function drawGrid() {
            if (!showGrid) return;
            ctx.beginPath();
            ctx.strokeStyle = '#4a4a6a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 64; i++) {
                ctx.moveTo(i * 8, 0);
                ctx.lineTo(i * 8, 512);
                ctx.stroke();
                ctx.moveTo(0, i * 8);
                ctx.lineTo(512, i * 8);
                ctx.stroke();
            }
        }
        
        function drawFull() {
            ctx.clearRect(0, 0, 512, 512);
            drawBackground();
            drawAllBoxes();
            drawGrid();
            
            const region = currentRegions[selectedName];
            if (region) {
                document.getElementById('coordX').value = region.x;
                document.getElementById('coordY').value = region.y;
                document.getElementById('coordW').value = region.w;
                document.getElementById('coordH').value = region.h;
            }
        }
        
        function getMouseCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let canvasX = (e.clientX - rect.left) * scaleX;
            let canvasY = (e.clientY - rect.top) * scaleY;
            canvasX = Math.min(511, Math.max(0, canvasX));
            canvasY = Math.min(511, Math.max(0, canvasY));
            return { x: canvasX, y: canvasY };
        }
        
        function findRegionByPixel(px, py) {
            for (let [name, region] of Object.entries(currentRegions)) {
                const x = region.x * 8;
                const y = region.y * 8;
                const w = region.w * 8;
                const h = region.h * 8;
                if (px >= x && px <= x + w && py >= y && py <= y + h) {
                    return { name, region };
                }
            }
            return null;
        }
        
        canvas.addEventListener('mousedown', (e) => {
            const { x, y } = getMouseCanvasPos(e);
            const found = findRegionByPixel(x, y);
            
            if (found) {
                selectedName = found.name;
                drawFull();
                updateRegionListSelection();
                document.getElementById('statusBar').innerHTML = `✅ 已选中: ${selectedName} | 拖拽移动 | Shift+拖拽调整大小`;
                
                dragStartRegion = { ...currentRegions[selectedName] };
                dragStartX = x;
                dragStartY = y;
                
                if (e.shiftKey) {
                    isResizing = true;
                } else {
                    isDragging = true;
                }
                e.preventDefault();
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging && !isResizing) return;
            if (!selectedName) return;
            
            const { x, y } = getMouseCanvasPos(e);
            const deltaX = Math.round((x - dragStartX) / 8);
            const deltaY = Math.round((y - dragStartY) / 8);
            
            if (isDragging && (deltaX !== 0 || deltaY !== 0)) {
                const region = currentRegions[selectedName];
                region.x = Math.max(0, Math.min(64 - region.w, dragStartRegion.x + deltaX));
                region.y = Math.max(0, Math.min(64 - region.h, dragStartRegion.y + deltaY));
                drawFull();
                document.getElementById('statusBar').innerHTML = `📐 ${selectedName} 移动到了 (${region.x}, ${region.y})`;
            }
            
            if (isResizing && (deltaX !== 0 || deltaY !== 0)) {
                const region = currentRegions[selectedName];
                const newW = Math.max(1, Math.min(64 - region.x, dragStartRegion.w + deltaX));
                const newH = Math.max(1, Math.min(64 - region.y, dragStartRegion.h + deltaY));
                region.w = newW;
                region.h = newH;
                drawFull();
                document.getElementById('statusBar').innerHTML = `📏 ${selectedName} 大小调整为 ${region.w}x${region.h}`;
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            isResizing = false;
            dragStartRegion = null;
        });
        
        document.getElementById('coordX').addEventListener('change', (e) => {
            const region = currentRegions[selectedName];
            if (region) region.x = Math.max(0, Math.min(64 - region.w, parseInt(e.target.value) || 0));
            drawFull();
        });
        document.getElementById('coordY').addEventListener('change', (e) => {
            const region = currentRegions[selectedName];
            if (region) region.y = Math.max(0, Math.min(64 - region.h, parseInt(e.target.value) || 0));
            drawFull();
        });
        document.getElementById('coordW').addEventListener('change', (e) => {
            const region = currentRegions[selectedName];
            if (region) region.w = Math.max(1, Math.min(64 - region.x, parseInt(e.target.value) || 1));
            drawFull();
        });
        document.getElementById('coordH').addEventListener('change', (e) => {
            const region = currentRegions[selectedName];
            if (region) region.h = Math.max(1, Math.min(64 - region.y, parseInt(e.target.value) || 1));
            drawFull();
        });
        
        function buildRegionList() {
            const container = document.getElementById('regionList');
            const groups = {
                'head': '头内层', 'hat': '头外层',
                'body': '身体内层', 'jacket': '身体外层',
                'rightArm': '右臂内层', 'rightSleeve': '右臂外层',
                'leftArm': '左臂内层', 'leftSleeve': '左臂外层',
                'rightLeg': '右腿内层', 'rightPants': '右腿外层',
                'leftLeg': '左腿内层', 'leftPants': '左腿外层'
            };
            
            let html = '';
            for (let [groupKey, groupName] of Object.entries(groups)) {
                html += `<div class="region-group">
                    <div class="region-group-title">📁 ${groupName}</div>
                    <div class="region-buttons">`;
                for (let [name, region] of Object.entries(currentRegions)) {
                    if (region.group === groupKey) {
                        html += `<button class="region-btn ${name === selectedName ? 'selected' : ''}" data-name="${name}">${name}</button>`;
                    }
                }
                html += `</div></div>`;
            }
            container.innerHTML = html;
            
            document.querySelectorAll('.region-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    selectedName = btn.dataset.name;
                    document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    drawFull();
                    document.getElementById('statusBar').innerHTML = `✅ 已选中: ${selectedName}`;
                });
            });
        }
        
        function updateRegionListSelection() {
            document.querySelectorAll('.region-btn').forEach(btn => {
                if (btn.dataset.name === selectedName) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });
        }
        
        function switchModel(model) {
            currentModel = model;
            if (model === 'steve') {
                currentRegions = steveRegions;
                document.getElementById('steveModelBtn').classList.add('selected');
                document.getElementById('alexModelBtn').classList.remove('selected');
                document.getElementById('statusBar').innerHTML = '✅ 已切换到 Steve 模型（手臂 4px）';
            } else {
                currentRegions = alexRegions;
                document.getElementById('steveModelBtn').classList.remove('selected');
                document.getElementById('alexModelBtn').classList.add('selected');
                document.getElementById('statusBar').innerHTML = '✅ 已切换到 Alex 模型（手臂 3px）';
            }
            selectedName = '头正面内层';
            buildRegionList();
            drawFull();
        }
        
        document.getElementById('steveModelBtn').addEventListener('click', () => switchModel('steve'));
        document.getElementById('alexModelBtn').addEventListener('click', () => switchModel('alex'));
        
        document.getElementById('uploadBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        currentImage = img;
                        drawFull();
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
        
        document.getElementById('exportBtn').addEventListener('click', () => {
            let code = `// ${currentModel === 'steve' ? 'Steve' : 'Alex'} 模型皮肤分区坐标\nconst skinRegions = {\n`;
            for (let [name, region] of Object.entries(currentRegions)) {
                code += `    "${name}": { x: ${region.x}, y: ${region.y}, w: ${region.w}, h: ${region.h} },\n`;
            }
            code += `};\n\n// 复制到 Three.js 的 getFaceMaterial 中使用`;
            navigator.clipboard.writeText(code);
            document.getElementById('statusBar').innerHTML = '📋 代码已复制到剪贴板！';
            setTimeout(() => {
                document.getElementById('statusBar').innerHTML = '✅ 选择一个区域，然后拖拽移动 | Shift+拖拽调整大小';
            }, 2000);
        });
        
        let currentZoom = 1;
        document.getElementById('zoomInBtn').addEventListener('click', () => {
            currentZoom = Math.min(3, currentZoom + 0.25);
            canvas.style.width = (512 * currentZoom) + 'px';
            canvas.style.height = (512 * currentZoom) + 'px';
            document.getElementById('zoomLevel').innerHTML = Math.round(currentZoom * 100) + '%';
        });
        document.getElementById('zoomOutBtn').addEventListener('click', () => {
            currentZoom = Math.max(0.5, currentZoom - 0.25);
            canvas.style.width = (512 * currentZoom) + 'px';
            canvas.style.height = (512 * currentZoom) + 'px';
            document.getElementById('zoomLevel').innerHTML = Math.round(currentZoom * 100) + '%';
        });
        document.getElementById('fitViewBtn').addEventListener('click', () => {
            currentZoom = 1;
            canvas.style.width = '512px';
            canvas.style.height = '512px';
            document.getElementById('zoomLevel').innerHTML = '100%';
        });
        document.getElementById('resetViewBtn').addEventListener('click', () => {
            currentZoom = 1;
            canvas.style.width = '512px';
            canvas.style.height = '512px';
            drawFull();
        });
        document.getElementById('toggleGridBtn').addEventListener('click', (e) => {
            showGrid = !showGrid;
            e.target.classList.toggle('active', showGrid);
            drawFull();
        });
        
        initCanvas();
        buildRegionList();
        
        const defaultImg = new Image();
        defaultImg.onload = () => {
            currentImage = defaultImg;
            drawFull();
        };
        defaultImg.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAZdEVYdFNvZnR3YXJlAHBhaW50Lm5ldCA0LjAuMTM0A1t6AAAAAElFTkSuQmCC';
    </script>
