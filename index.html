<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI生图站 - 皮肤展示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; height: 100vh; }
        
        .container {
            display: flex;
            height: 100vh;
            gap: 20px;
            padding: 20px;
        }
        
        .left-panel {
            width: 380px;
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        
        .right-panel {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        textarea, select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 14px;
            font-family: inherit;
        }
        button { 
            background: #007bff; 
            color: white; 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            width: 100%; 
        }
        button:hover { background: #0056b3; }
        
        .skin-display {
            flex: 1;
            background: #1a1a2e;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 400px;
        }
        
        .skin-image {
            width: 300px;
            height: 300px;
            background: #2d2d44;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .skin-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .skin-info {
            color: white;
            text-align: center;
        }
        
        .status-msg {
            margin-top: 16px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .status-success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .status-error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .demand-list {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
        
        .demand-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            margin-bottom: 8px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        
        .demand-item strong {
            display: block;
            margin-bottom: 5px;
        }
        
        .demand-meta {
            color: #666;
            font-size: 12px;
        }
        
        .upload-area {
            margin-top: 20px;
            padding: 15px;
            background: #f0f2f5;
            border-radius: 12px;
        }
        
        .upload-area input {
            margin-top: 10px;
            display: block;
        }
        
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .left-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧：提交需求 -->
        <div class="left-panel">
            <h2>🎨 提交生图需求</h2>
            <form id="demandForm">
                <div class="form-group">
                    <label>关键词 / 画面描述</label>
                    <textarea rows="4" placeholder="例如：一只穿着宇航服的猫，在火星上..." id="keywords" required></textarea>
                </div>
                <div class="form-group">
                    <label>风格选项</label>
                    <select id="style">
                        <option>写实摄影</option>
                        <option>二次元动漫</option>
                        <option>水彩手绘</option>
                        <option>赛博朋克</option>
                    </select>
                </div>
                <button type="submit">📤 提交需求</button>
            </form>
            <div id="msg" class="status-msg"></div>
            
            <div class="demand-list">
                <h3>📋 需求记录</h3>
                <div id="demandList" style="font-size: 14px; max-height: 250px; overflow-y: auto;">
                    <p style="color: #999;">暂无提交记录</p>
                </div>
            </div>
        </div>

        <!-- 右侧：皮肤展示 -->
        <div class="right-panel">
            <h2>🖼️ Minecraft 皮肤展示</h2>
            <div class="skin-display">
                <div class="skin-image">
                    <img id="skinPreview" src="remember.png" alt="皮肤预览" onerror="this.src='https://via.placeholder.com/300x300?text=皮肤加载失败'">
                </div>
                <div class="skin-info">
                    <strong id="skinName">remember.png</strong><br>
                    <small>当前显示的皮肤</small>
                </div>
            </div>
            
            <div class="upload-area">
                <h3>🔼 切换皮肤</h3>
                <input type="file" id="skinUpload" accept="image/png">
                <p style="font-size: 12px; color: #666; margin-top: 8px;">
                    💡 提示：将 PNG 皮肤文件放在同一目录下，或点击上传新皮肤
                </p>
            </div>
        </div>
    </div>

    <script>
        // 等待页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成');
            loadDemands();
            
            // 设置默认皮肤文件名显示
            const skinFileName = 'remember.png';
            document.getElementById('skinName').textContent = skinFileName;
            
            // 检查默认皮肤是否加载成功
            const skinImg = document.getElementById('skinPreview');
            skinImg.onerror = function() {
                console.warn('默认皮肤加载失败，请确保 remember.png 文件存在');
                document.getElementById('skinName').innerHTML = 'remember.png <span style="color:orange;">(文件未找到)</span>';
            };
        });
        
        // 显示消息
        function showMessage(text, type) {
            const msgEl = document.getElementById('msg');
            msgEl.textContent = text;
            msgEl.className = 'status-msg status-' + type;
            setTimeout(function() {
                msgEl.className = 'status-msg';
            }, 3000);
        }
        
        // 保存需求
        function saveDemand(keywords, style) {
            var demands = localStorage.getItem('ai_demands');
            if (demands) {
                demands = JSON.parse(demands);
            } else {
                demands = [];
            }
            
            var newDemand = {
                id: Date.now(),
                keywords: keywords,
                style: style,
                time: new Date().toLocaleString()
            };
            demands.unshift(newDemand);
            
            // 只保留最近20条
            if (demands.length > 20) {
                demands.pop();
            }
            
            localStorage.setItem('ai_demands', JSON.stringify(demands));
            return demands;
        }
        
        // 显示需求列表
        function loadDemands() {
            var demands = localStorage.getItem('ai_demands');
            var container = document.getElementById('demandList');
            
            if (!demands || demands === '[]') {
                container.innerHTML = '<p style="color: #999;">暂无提交记录</p>';
                return;
            }
            
            demands = JSON.parse(demands);
            var html = '';
            for (var i = 0; i < demands.length; i++) {
                var d = demands[i];
                var shortKeywords = d.keywords.substring(0, 60);
                if (d.keywords.length > 60) {
                    shortKeywords += '...';
                }
                html += '<div class="demand-item">';
                html += '<strong>📝 ' + escapeHtml(shortKeywords) + '</strong>';
                html += '<div class="demand-meta">🎭 ' + escapeHtml(d.style) + ' | 🕐 ' + escapeHtml(d.time) + '</div>';
                html += '</div>';
            }
            container.innerHTML = html;
        }
        
        // 防止XSS
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 上传皮肤
        function setupUpload() {
            var uploadInput = document.getElementById('skinUpload');
            if (!uploadInput) return;
            
            uploadInput.addEventListener('change', function(e) {
                var file = e.target.files[0];
                if (!file) return;
                
                if (!file.type.match('image/png')) {
                    showMessage('请上传 PNG 格式的皮肤文件', 'error');
                    return;
                }
                
                var reader = new FileReader();
                reader.onload = function(evt) {
                    var skinImg = document.getElementById('skinPreview');
                    skinImg.src = evt.target.result;
                    document.getElementById('skinName').textContent = file.name;
                    showMessage('✅ 皮肤加载成功！', 'success');
                };
                reader.onerror = function() {
                    showMessage('❌ 皮肤加载失败', 'error');
                };
                reader.readAsDataURL(file);
            });
        }
        
        // 表单提交
        function setupForm() {
            var form = document.getElementById('demandForm');
            if (!form) return;
            
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                var keywords = document.getElementById('keywords').value.trim();
                var style = document.getElementById('style').value;
                
                if (!keywords) {
                    showMessage('请填写画面描述', 'error');
                    return;
                }
                
                saveDemand(keywords, style);
                showMessage('✅ 需求已提交！风格：' + style, 'success');
                document.getElementById('keywords').value = '';
                loadDemands();
                
                // 打印到控制台供管理员查看
                console.log('新需求：', { keywords: keywords, style: style, time: new Date().toISOString() });
            });
        }
        
        // 初始化
        setupForm();
        setupUpload();
    </script>
</body>
</html>
