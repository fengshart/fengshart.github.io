<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI生图站 - 左右分栏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; height: 100vh; }
        
        .container {
            display: flex;
            height: 100vh;
            gap: 20px;
            padding: 20px;
        }
        
        .left-panel {
            width: 380px;
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        
        .right-panel {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { background: #007bff; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .card {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-4px); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card .info { padding: 12px; }
        .download-btn { display: inline-block; margin-top: 8px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h2>🎨 提交生图需求</h2>
            <form id="demandForm">
                <div class="form-group">
                    <label>关键词 / 画面描述</label>
                    <textarea rows="4" placeholder="例如：一只穿着宇航服的猫，在火星上..." id="keywords" required></textarea>
                </div>
                <div class="form-group">
                    <label>风格选项</label>
                    <select id="style">
                        <option>写实摄影</option>
                        <option>二次元动漫</option>
                        <option>水彩手绘</option>
                        <option>赛博朋克</option>
                    </select>
                </div>
                <button type="submit">📤 提交需求</button>
            </form>
            <div id="msg" style="margin-top: 16px; color: green; font-size: 14px;"></div>
        </div>

        <div class="right-panel">
            <h2>🖼️ AI作品集</h2>
            <div class="gallery" id="gallery">
                <div class="card">
                    <canvas id="skin-canvas" width="348" height="348" style="width:100%;height:300px;"></canvas>
                    <div class="info">我的世界皮肤</div>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skinview3d@3.0.1/bundle/skinview3d.bundle.min.js"></script>
<script>
const viewer = new skinview3d.SkinViewer({
    canvas: document.getElementById("skin-canvas"),
    skin: "https://raw.githubusercontent.com/fengshart/fengshart.github.io/main/remember.png"
});

document.getElementById('demandForm').addEventListener('submit', function(e){
    e.preventDefault();
    document.getElementById('msg').innerText = '✅ 需求已提交';
    this.reset();
    setTimeout(()=>msg.innerText='',3000);
});
</script>
</body>
</html>
