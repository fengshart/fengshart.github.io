<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI Minecraft 皮肤生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; display: flex; gap: 20px; flex-wrap: wrap; }
        .left-panel { flex: 1; min-width: 320px; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .right-panel { flex: 2; min-width: 500px; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; }
        button { background: #007bff; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #canvas-container { width: 100%; height: 450px; background: #1a1a2e; border-radius: 16px; overflow: hidden; cursor: grab; margin-bottom: 20px; }
        .generated-skin { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 12px; text-align: center; }
        .generated-skin img { max-width: 200px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .loading { display: none; text-align: center; padding: 20px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-msg { margin-top: 16px; padding: 10px; border-radius: 8px; display: none; }
        .status-success { background: #d4edda; color: #155724; display: block; }
        .status-error { background: #f8d7da; color: #721c24; display: block; }
        .status-info { background: #d1ecf1; color: #0c5460; display: block; }
        .demand-list { margin-top: 30px; padding-top: 20px; border-top: 1px solid #ddd; max-height: 300px; overflow-y: auto; }
        .demand-item { padding: 12px; border-bottom: 1px solid #eee; background: #f9f9f9; border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
        .demand-item:hover { background: #e9ecef; }
        @media (max-width: 768px) { .left-panel, .right-panel { min-width: auto; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h2>🎨 AI 生成 Minecraft 皮肤</h2>
            <form id="generateForm">
                <div class="form-group">
                    <label>🎭 角色描述</label>
                    <textarea rows="4" placeholder="例如：穿着红色披风的忍者、太空宇航员、中国古风侠客..." id="prompt" required></textarea>
                </div>
                <div class="form-group">
                    <label>🎨 风格</label>
                    <select id="style">
                        <option>原版风格</option>
                        <option>卡通风格</option>
                        <option>写实风格</option>
                        <option>梦幻风格</option>
                    </select>
                </div>
                <button type="submit" id="generateBtn">✨ 生成皮肤</button>
            </form>
            <div id="msg" class="status-msg"></div>
            <div class="demand-list">
                <h3>📋 历史记录</h3>
                <div id="demandList">暂无记录</div>
                <button id="clearHistory" style="margin-top: 10px; background: #dc3545;">清空历史</button>
            </div>
        </div>
        <div class="right-panel">
            <h2>🎮 3D 皮肤预览</h2>
            <div id="canvas-container"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>AI 正在生成皮肤，请稍候...</p>
            </div>
            <div class="generated-skin" id="generatedSkin" style="display: none;">
                <h4>📸 生成的皮肤贴图</h4>
                <img id="skinImage" alt="生成的皮肤">
                <br>
                <button id="downloadSkin" style="margin-top: 10px; width: auto; padding: 8px 20px;">💾 下载皮肤</button>
            </div>
            <div class="control-info" style="margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px; text-align: center; font-size: 14px;">
                🖱️ 鼠标拖拽旋转 | 右键平移 | 滚轮缩放
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // 初始化场景
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(4, 1.5, 5);
        camera.lookAt(0, 0.4, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.4, 0);
        
        // 灯光
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0x88aaff, 0.5);
        backLight.position.set(-3, 2, -4);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xaa8866, 0.3);
        fillLight.position.set(0, 1, 0);
        scene.add(fillLight);
        
        // 网格地面（脚底贴合 Y = -1.2）
        const gridHelper = new THREE.GridHelper(8, 16, 0x88aaff, 0x335588);
        gridHelper.position.y = -1.2;
        scene.add(gridHelper);
        
        // ========== 模型组 ==========
        const group = new THREE.Group();
        const meshes = {};
        
        function createTempMat() {
            return new THREE.MeshStandardMaterial({ color: 0x88aaff });
        }
        
        // ----- 头：高0.8，范围 Y: 1.2 ~ 2.0，中心 Y = 1.6 -----
        const headGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const head = new THREE.Mesh(headGeo, [
            createTempMat(), createTempMat(), createTempMat(),
            createTempMat(), createTempMat(), createTempMat()
        ]);
        head.position.set(0, 1.6, 0);
        head.castShadow = true;
        group.add(head);
        meshes.head = head;
        
        // ----- 身体：高1.2，范围 Y: 0 ~ 1.2，中心 Y = 0.6 -----
        const bodyGeo = new THREE.BoxGeometry(0.8, 1.2, 0.4);
        const body = new THREE.Mesh(bodyGeo, [
            createTempMat(), createTempMat(), createTempMat(),
            createTempMat(), createTempMat(), createTempMat()
        ]);
        body.position.set(0, 0.6, 0);
        body.castShadow = true;
        group.add(body);
        meshes.body = body;
        
        // ----- 手臂几何体 -----
        const armGeo = new THREE.BoxGeometry(0.4, 1.2, 0.4);
        
        // 左臂：用 Group 包装，轴心在肩膀 (Y=1.2)
        const armLeftGroup = new THREE.Group();
        const armLeftMesh = new THREE.Mesh(armGeo, createTempMat());
        armLeftMesh.position.set(0, -0.6, 0);  // mesh 中心向下偏移半高
        armLeftGroup.add(armLeftMesh);
        armLeftGroup.position.set(-0.6, 1.2, 0);  // Group 定位在肩膀
        armLeftGroup.castShadow = true;
        group.add(armLeftGroup);
        meshes.armLeft = armLeftGroup;
        meshes.armLeftMesh = armLeftMesh;
        
        // 右臂：用 Group 包装，轴心在肩膀 (Y=1.2)
        const armRightGroup = new THREE.Group();
        const armRightMesh = new THREE.Mesh(armGeo, createTempMat());
        armRightMesh.position.set(0, -0.6, 0);
        armRightGroup.add(armRightMesh);
        armRightGroup.position.set(0.6, 1.2, 0);
        armRightGroup.castShadow = true;
        group.add(armRightGroup);
        meshes.armRight = armRightGroup;
        meshes.armRightMesh = armRightMesh;
        
        // ----- 腿几何体 -----
        const legGeo = new THREE.BoxGeometry(0.4, 1.2, 0.4);
        
        // 左腿：用 Group 包装，轴心在大腿根 (Y=0)
        const legLeftGroup = new THREE.Group();
        const legLeftMesh = new THREE.Mesh(legGeo, createTempMat());
        legLeftMesh.position.set(0, -0.6, 0);  // mesh 中心向下偏移半高
        legLeftGroup.add(legLeftMesh);
        legLeftGroup.position.set(-0.2, 0, 0);  // Group 定位在大腿根
        legLeftGroup.castShadow = true;
        group.add(legLeftGroup);
        meshes.legLeft = legLeftGroup;
        meshes.legLeftMesh = legLeftMesh;
        
        // 右腿：用 Group 包装，轴心在大腿根 (Y=0)
        const legRightGroup = new THREE.Group();
        const legRightMesh = new THREE.Mesh(legGeo, createTempMat());
        legRightMesh.position.set(0, -0.6, 0);
        legRightGroup.add(legRightMesh);
        legRightGroup.position.set(0.2, 0, 0);
        legRightGroup.castShadow = true;
        group.add(legRightGroup);
        meshes.legRight = legRightGroup;
        meshes.legRightMesh = legRightMesh;
        
        scene.add(group);
        
        // ========== 单摆动画（绕正确的轴心）==========
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;
            
            // 手臂：绕肩膀旋转 ±30° (0.523 弧度)
            const armSwing = Math.sin(time) * 0.523;
            meshes.armLeft.rotation.x = -armSwing;
            meshes.armRight.rotation.x = armSwing;
            
            // 腿：绕大腿根旋转 ±20° (0.35 弧度)，与手臂同向（左臂+左腿同时向前）
            const legSwing = Math.sin(time) * 0.4;
            meshes.legLeft.rotation.x = legSwing;
            meshes.legRight.rotation.x = -legSwing;
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
        
        // ========== 皮肤纹理裁切 ==========
        function getFaceMaterial(img, x, y, w, h) {
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, x, y, w, h, 0, 0, w, h);
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter;
            return new THREE.MeshStandardMaterial({ map: texture });
        }
        
        function applySkinToModel(imageUrl) {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                // 头部 6 面
                const headMats = [
                    getFaceMaterial(img, 0, 8, 8, 8),   // 右
                    getFaceMaterial(img, 16, 8, 8, 8),  // 左
                    getFaceMaterial(img, 8, 0, 8, 8),   // 上
                    getFaceMaterial(img, 16, 0, 8, 8),  // 下
                    getFaceMaterial(img, 8, 8, 8, 8),   // 前
                    getFaceMaterial(img, 24, 8, 8, 8)   // 后
                ];
                // 身体 6 面
                const bodyMats = [
                    getFaceMaterial(img, 24, 20, 4, 12),  // 右
                    getFaceMaterial(img, 16, 20, 4, 12), // 左
                    getFaceMaterial(img, 20, 16, 8, 4),  // 上
                    getFaceMaterial(img, 20, 32, 8, 4),  // 下
                    getFaceMaterial(img, 20, 20, 8, 12), // 前
                    getFaceMaterial(img, 28, 20, 8, 12)  // 后
                ];
                // 手臂材质
                const armMat = getFaceMaterial(img, 40, 20, 4, 12);
                // 腿材质
                const legMat = getFaceMaterial(img, 4, 20, 4, 12);
                
                meshes.head.material = headMats;
                meshes.body.material = bodyMats;
                meshes.armLeftMesh.material = armMat.clone();
                meshes.armRightMesh.material = armMat.clone();
                meshes.legLeftMesh.material = legMat.clone();
                meshes.legRightMesh.material = legMat.clone();
                
                console.log('皮肤已应用');
            };
            img.onerror = () => console.error('皮肤加载失败:', imageUrl);
            img.src = imageUrl;
        }
        
        // 加载默认皮肤
        applySkinToModel('remember.png');
        
        // ========== AI 生成皮肤 ==========
        async function generateSkin(prompt, style) {
            const loadingDiv = document.getElementById('loading');
            const generateBtn = document.getElementById('generateBtn');
            loadingDiv.style.display = 'block';
            generateBtn.disabled = true;
            try {
                const fullPrompt = `Minecraft skin character, ${prompt}, ${style}, pixel art, 64x64`;
                const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?width=512&height=512&nologo=true`;
                const img = new Image();
                img.crossOrigin = "Anonymous";
                await new Promise((resolve, reject) => {
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 64;
                        canvas.height = 64;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, 64, 64);
                        const skinDataUrl = canvas.toDataURL('image/png');
                        document.getElementById('skinImage').src = skinDataUrl;
                        document.getElementById('generatedSkin').style.display = 'block';
                        applySkinToModel(skinDataUrl);
                        saveToHistory(prompt, style, skinDataUrl);
                        resolve();
                    };
                    img.onerror = () => reject(new Error('生成失败'));
                    img.src = imageUrl;
                });
                showMessage('✅ 皮肤生成成功', 'success');
            } catch (error) {
                showMessage('❌ 生成失败', 'error');
            } finally {
                loadingDiv.style.display = 'none';
                generateBtn.disabled = false;
            }
        }
        
        // ========== 历史记录 ==========
        function saveToHistory(prompt, style, imageDataUrl) {
            let history = localStorage.getItem('mc_skin_history');
            history = history ? JSON.parse(history) : [];
            history.unshift({ id: Date.now(), prompt, style, imageData: imageDataUrl, time: new Date().toLocaleString() });
            if (history.length > 10) history.pop();
            localStorage.setItem('mc_skin_history', JSON.stringify(history));
            loadHistory();
        }
        
        function loadHistory() {
            let history = localStorage.getItem('mc_skin_history');
            const container = document.getElementById('demandList');
            if (!history || history === '[]') {
                container.innerHTML = '<p style="color:#999;">暂无记录</p>';
                return;
            }
            history = JSON.parse(history);
            let html = '';
            for (let i = 0; i < history.length; i++) {
                const h = history[i];
                html += `<div class="demand-item" data-index="${i}"><strong>📝 ${escapeHtml(h.prompt.substring(0, 50))}</strong><div style="font-size: 12px; color: #666;">🎭 ${h.style} | 🕐 ${h.time}</div></div>`;
            }
            container.innerHTML = html;
            document.querySelectorAll('.demand-item').forEach((item, idx) => {
                item.addEventListener('click', () => {
                    const historyData = JSON.parse(localStorage.getItem('mc_skin_history'));
                    if (historyData && historyData[idx]) {
                        const skinDataUrl = historyData[idx].imageData;
                        applySkinToModel(skinDataUrl);
                        document.getElementById('skinImage').src = skinDataUrl;
                        document.getElementById('generatedSkin').style.display = 'block';
                        showMessage('已加载历史皮肤', 'info');
                    }
                });
            });
        }
        
        function clearHistory() {
            if (confirm('清空记录？')) {
                localStorage.removeItem('mc_skin_history');
                loadHistory();
                showMessage('已清空', 'info');
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('msg');
            msgDiv.textContent = text;
            msgDiv.className = `status-msg status-${type}`;
            setTimeout(() => { msgDiv.className = 'status-msg'; }, 3000);
        }
        
        // 下载皮肤
        document.getElementById('downloadSkin').addEventListener('click', () => {
            const skinImg = document.getElementById('skinImage');
            if (skinImg.src) {
                const link = document.createElement('a');
                link.download = `mc_skin_${Date.now()}.png`;
                link.href = skinImg.src;
                link.click();
            }
        });
        
        // 表单提交
        document.getElementById('generateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = document.getElementById('prompt').value.trim();
            const style = document.getElementById('style').value;
            if (!prompt) {
                showMessage('请填写描述', 'error');
                return;
            }
            await generateSkin(prompt, style);
        });
        
        document.getElementById('clearHistory').addEventListener('click', clearHistory);
        loadHistory();
        
        const resizeObserver = new ResizeObserver(() => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
        resizeObserver.observe(container);
    </script>
</body>
</html>
