<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D Minecraft 皮肤展示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: #16213e;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #aaa;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        /* 3D画布容器 */
        #canvas-container {
            width: 100%;
            height: 500px;
            background: #0f0f1a;
            border-radius: 16px;
            overflow: hidden;
            cursor: grab;
        }
        
        #canvas-container:active {
            cursor: grabbing;
        }
        
        .info {
            color: white;
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 14px;
        }
        
        .controls {
            color: #aaa;
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
        }
        
        .upload-area {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            text-align: center;
        }
        
        .upload-area input {
            margin-top: 10px;
            color: white;
        }
        
        .status {
            margin-top: 10px;
            color: #4caf50;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎮 Minecraft 3D 皮肤展示</h1>
        <div class="subtitle">史蒂夫风格 · 可拖拽旋转/缩放</div>
        
        <!-- 3D画布放这里 -->
        <div id="canvas-container"></div>
        
        <div class="info">
            🖱️ 鼠标拖拽旋转视角 | 右键拖拽平移 | 滚轮缩放
        </div>
        
        <div class="upload-area">
            <label style="color: white;">📤 上传你的皮肤 (PNG)</label>
            <input type="file" id="skinUpload" accept="image/png">
            <div id="status" class="status"></div>
        </div>
        
        <div class="controls">
            💡 当前皮肤: remember.png (放在同一目录下)
        </div>
    </div>

    <!-- 使用稳定的 CDN 版本 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "skinview3d": "https://unpkg.com/skinview3d@3.0.1/dist/skinview3d.module.js"
            }
        }
    </script>

    <script type="module">
        // 导入需要的模块
        import { SkinViewer, WalkingAnimation } from 'skinview3d';
        
        let skinViewer = null;
        const container = document.getElementById('canvas-container');
        
        // 皮肤文件（放在同一目录下的 remember.png）
        const skinUrl = 'remember.png';
        
        // 创建3D皮肤查看器
        function initSkinViewer() {
            if (!container) return;
            
            // 清空容器
            container.innerHTML = '';
            
            // 创建 SkinViewer 实例
            skinViewer = new SkinViewer({
                canvas: document.createElement('canvas'),
                width: container.clientWidth,
                height: container.clientHeight,
                skin: skinUrl,
                background: '#0f0f1a',
                zoom: 0.9,
                orbitControls: true  // 启用鼠标控制
            });
            
            // 把 canvas 添加到容器
            container.appendChild(skinViewer.canvas);
            
            // 添加行走动画
            const walkAnimation = new WalkingAnimation(skinViewer);
            walkAnimation.speed = 0.5;
            walkAnimation.start();
            
            // 设置相机位置
            skinViewer.zoom = 0.9;
            skinViewer.rotationX = 0.2;
            skinViewer.rotationY = 0.5;
            
            // 渲染
            skinViewer.render();
            
            // 监听窗口大小变化，自适应
            window.addEventListener('resize', () => {
                if (skinViewer && container) {
                    const rect = container.getBoundingClientRect();
                    skinViewer.width = rect.width;
                    skinViewer.height = rect.height;
                    skinViewer.render();
                }
            });
            
            // 皮肤加载成功的回调
            skinViewer.playerObject.then(() => {
                console.log('✅ 皮肤加载成功:', skinUrl);
                const statusDiv = document.getElementById('status');
                if (statusDiv) {
                    statusDiv.innerHTML = '✅ 皮肤加载成功！';
                    statusDiv.style.color = '#4caf50';
                }
            }).catch((err) => {
                console.error('❌ 皮肤加载失败:', err);
                const statusDiv = document.getElementById('status');
                if (statusDiv) {
                    statusDiv.innerHTML = '⚠️ 皮肤文件未找到，请确保 remember.png 在同一目录下';
                    statusDiv.style.color = '#ff9800';
                }
            });
            
            return skinViewer;
        }
        
        // 上传自定义皮肤
        function setupUpload() {
            const uploadInput = document.getElementById('skinUpload');
            if (!uploadInput) return;
            
            uploadInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                if (!file.type.match('image/png')) {
                    const statusDiv = document.getElementById('status');
                    statusDiv.innerHTML = '❌ 请上传 PNG 格式的皮肤文件';
                    statusDiv.style.color = '#f44336';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const customSkinUrl = evt.target.result;
                    if (skinViewer) {
                        skinViewer.skin = customSkinUrl;
                        const statusDiv = document.getElementById('status');
                        statusDiv.innerHTML = '✅ 自定义皮肤加载成功！';
                        statusDiv.style.color = '#4caf50';
                    }
                };
                reader.onerror = () => {
                    const statusDiv = document.getElementById('status');
                    statusDiv.innerHTML = '❌ 皮肤加载失败';
                    statusDiv.style.color = '#f44336';
                };
                reader.readAsDataURL(file);
            });
        }
        
        // 等待容器尺寸确定后初始化
        setTimeout(() => {
            initSkinViewer();
        }, 100);
        
        // 设置上传功能
        setupUpload();
    </script>
</body>
</html>
