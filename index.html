<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI Minecraft 皮肤生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; min-height: 100vh; padding: 20px; }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .left-panel {
            flex: 1;
            min-width: 350px;
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .right-panel {
            flex: 2;
            min-width: 500px;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        textarea, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 14px;
            font-family: inherit;
        }
        button { 
            background: #007bff; 
            color: white; 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            width: 100%; 
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #canvas-container {
            width: 100%;
            height: 450px;
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
            cursor: grab;
            margin-bottom: 20px;
        }
        
        .generated-skin {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            text-align: center;
        }
        
        .generated-skin img {
            max-width: 200px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status-msg {
            margin-top: 16px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .status-success { background: #d4edda; color: #155724; display: block; }
        .status-error { background: #f8d7da; color: #721c24; display: block; }
        .status-info { background: #d1ecf1; color: #0c5460; display: block; }
        
        .demand-list {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .demand-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .demand-item:hover { background: #e9ecef; }
        
        @media (max-width: 768px) {
            .left-panel, .right-panel { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h2>🎨 AI 生成 Minecraft 皮肤</h2>
            <form id="generateForm">
                <div class="form-group">
                    <label>🎭 角色描述</label>
                    <textarea rows="4" placeholder="例如：穿着红色披风的忍者、太空宇航员、中国古风侠客..." id="prompt" required></textarea>
                </div>
                <div class="form-group">
                    <label>🎨 风格</label>
                    <select id="style">
                        <option>原版风格</option>
                        <option>卡通风格</option>
                        <option>写实风格</option>
                        <option>梦幻风格</option>
                    </select>
                </div>
                <button type="submit" id="generateBtn">✨ 生成皮肤</button>
            </form>
            <div id="msg" class="status-msg"></div>
            
            <div class="demand-list">
                <h3>📋 历史记录</h3>
                <div id="demandList">暂无记录</div>
                <button id="clearHistory" style="margin-top: 10px; background: #dc3545;">清空历史</button>
            </div>
        </div>

        <div class="right-panel">
            <h2>🎮 3D 皮肤预览</h2>
            <div id="canvas-container"></div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>AI 正在生成皮肤，请稍候...</p>
            </div>
            
            <div class="generated-skin" id="generatedSkin" style="display: none;">
                <h4>📸 生成的皮肤贴图</h4>
                <img id="skinImage" alt="生成的皮肤">
                <br>
                <button id="downloadSkin" style="margin-top: 10px; width: auto; padding: 8px 20px;">💾 下载皮肤</button>
            </div>
            
            <div class="control-info" style="margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px; text-align: center; font-size: 14px;">
                🖱️ 鼠标拖拽旋转 | 右键平移 | 滚轮缩放 | 皮肤会实时应用到3D模型
            </div>
        </div>
    </div>

    <!-- Three.js 3D 引擎 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ========== 1. 初始化 3D 场景 ==========
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(4, 3, 5);
        camera.lookAt(0, 1.5, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.target.set(0, 1.5, 0);
        
        // 灯光
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0x88aaff, 0.5);
        backLight.position.set(-3, 2, -4);
        scene.add(backLight);
        
        const gridHelper = new THREE.GridHelper(10, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.8;
        scene.add(gridHelper);
        
        // ========== 2. 创建 Minecraft 方块人模型 ==========
        const group = new THREE.Group();
        const parts = {
            head:    { w: 0.8, h: 0.8, d: 0.8, pos: [0, 1.8, 0] },
            body:    { w: 0.8, h: 1.0, d: 0.4, pos: [0, 1.0, 0] },
            armL:    { w: 0.4, h: 0.9, d: 0.4, pos: [-0.7, 1.2, 0] },
            armR:    { w: 0.4, h: 0.9, d: 0.4, pos: [0.7, 1.2, 0] },
            legL:    { w: 0.4, h: 0.9, d: 0.4, pos: [-0.4, 0.25, 0] },
            legR:    { w: 0.4, h: 0.9, d: 0.4, pos: [0.4, 0.25, 0] }
        };
        
        const meshes = {};
        const tempMat = new THREE.MeshStandardMaterial({ color: 0x88aaff });
        
        for (let [name, cfg] of Object.entries(parts)) {
            const geometry = new THREE.BoxGeometry(cfg.w, cfg.h, cfg.d);
            const mesh = new THREE.Mesh(geometry, tempMat.clone());
            mesh.position.set(cfg.pos[0], cfg.pos[1], cfg.pos[2]);
            mesh.castShadow = true;
            group.add(mesh);
            meshes[name] = mesh;
        }
        scene.add(group);
        
        // 手臂动画
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;
            if (meshes.armL && meshes.armR) {
                const swing = Math.sin(time) * 0.6;
                meshes.armL.rotation.x = swing * 0.5;
                meshes.armR.rotation.x = -swing * 0.5;
            }
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
        
        // ========== 3. 应用皮肤纹理到 3D 模型 ==========
        function applySkinToModel(imageUrl) {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                const skinParts = {
                head:   { x: 8,  y: 8,  w: 8, h: 8, mesh: meshes.head },
                body:   { x: 20, y: 20, w: 8, h: 12, mesh: meshes.body },
                armL:   { x: 40, y: 20, w: 4, h: 12, mesh: meshes.armL },
                armR:   { x: 44, y: 20, w: 4, h: 12, mesh: meshes.armR },
                legL:   { x: 4,  y: 20, w: 4, h: 12, mesh: meshes.legL },
                legR:   { x: 8,  y: 20, w: 4, h: 12, mesh: meshes.legR }
            };
        
            for (let key in skinParts) {
                const part = skinParts[key];
                if (part.mesh) {
                    const canvas = document.createElement('canvas');
                    canvas.width = part.w;
                    canvas.height = part.h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, part.x, part.y, part.w, part.h, 0, 0, part.w, part.h);
                    const tex = new THREE.CanvasTexture(canvas);
                    tex.magFilter = THREE.NearestFilter;
                    part.mesh.material = new THREE.MeshStandardMaterial({ map: tex });
                }
            }
            console.log('皮肤已应用');
        };
        img.onerror = () => console.error('皮肤加载失败:', imageUrl);
        img.src = imageUrl;
    }
        
        // 默认皮肤
        applySkinToModel('remember.png');
        
        // ========== 4. AI 生成皮肤的核心函数 ==========
        // 注意：这里使用免费的 AI 图像生成 API（Pollinations.ai，无需 API Key）
        async function generateSkin(prompt, style) {
            const loadingDiv = document.getElementById('loading');
            const generateBtn = document.getElementById('generateBtn');
            const msgDiv = document.getElementById('msg');
            
            loadingDiv.style.display = 'block';
            generateBtn.disabled = true;
            msgDiv.className = 'status-msg';
            
            try {
                // 构建详细的生成提示词
                const fullPrompt = `Minecraft skin character, ${prompt}, ${style}, pixel art style, front view, game texture, 64x64 pixels, flat lighting`;
                
                // 使用 Pollinations.ai 免费图像生成 API
                const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?width=512&height=512&nologo=true`;
                
                // 加载图片并应用到模型
                const img = new Image();
                img.crossOrigin = "Anonymous";
                
                await new Promise((resolve, reject) => {
                    img.onload = () => {
                        // 创建 canvas 调整尺寸为 64x64（Minecraft 皮肤标准）
                        const canvas = document.createElement('canvas');
                        canvas.width = 64;
                        canvas.height = 64;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, 64, 64);
                        const skinDataUrl = canvas.toDataURL('image/png');
                        
                        // 显示生成的皮肤
                        const skinImg = document.getElementById('skinImage');
                        skinImg.src = skinDataUrl;
                        document.getElementById('generatedSkin').style.display = 'block';
                        
                        // 应用到 3D 模型
                        applySkinToModel(skinDataUrl);
                        
                        // 保存到历史记录
                        saveToHistory(prompt, style, skinDataUrl);
                        
                        resolve();
                    };
                    img.onerror = () => {
                        reject(new Error('图片生成失败，请重试'));
                    };
                    img.src = imageUrl;
                });
                
                showMessage('✅ 皮肤生成成功！已应用到3D模型', 'success');
                
            } catch (error) {
                console.error('生成失败:', error);
                showMessage('❌ 生成失败：' + error.message + '，请稍后重试', 'error');
            } finally {
                loadingDiv.style.display = 'none';
                generateBtn.disabled = false;
            }
        }
        
        // ========== 5. 历史记录管理 ==========
        function saveToHistory(prompt, style, imageDataUrl) {
            let history = localStorage.getItem('mc_skin_history');
            history = history ? JSON.parse(history) : [];
            history.unshift({
                id: Date.now(),
                prompt: prompt,
                style: style,
                imageData: imageDataUrl,
                time: new Date().toLocaleString()
            });
            // 只保留最近 10 条
            if (history.length > 10) history.pop();
            localStorage.setItem('mc_skin_history', JSON.stringify(history));
            loadHistory();
        }
        
        function loadHistory() {
            let history = localStorage.getItem('mc_skin_history');
            const container = document.getElementById('demandList');
            
            if (!history || history === '[]') {
                container.innerHTML = '<p style="color:#999;">暂无生成记录</p>';
                return;
            }
            
            history = JSON.parse(history);
            let html = '';
            for (let i = 0; i < history.length; i++) {
                const h = history[i];
                html += `
                    <div class="demand-item" data-index="${i}">
                        <strong>📝 ${escapeHtml(h.prompt.substring(0, 50))}</strong>
                        <div style="font-size: 12px; color: #666;">🎭 ${h.style} | 🕐 ${h.time}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
            
            // 绑定点击事件，重新加载历史皮肤
            document.querySelectorAll('.demand-item').forEach((item, idx) => {
                item.addEventListener('click', () => {
                    const historyData = JSON.parse(localStorage.getItem('mc_skin_history'));
                    if (historyData && historyData[idx]) {
                        const skinDataUrl = historyData[idx].imageData;
                        applySkinToModel(skinDataUrl);
                        document.getElementById('skinImage').src = skinDataUrl;
                        document.getElementById('generatedSkin').style.display = 'block';
                        showMessage('已加载历史皮肤', 'info');
                    }
                });
            });
        }
        
        function clearHistory() {
            if (confirm('确定清空所有历史记录吗？')) {
                localStorage.removeItem('mc_skin_history');
                loadHistory();
                showMessage('历史记录已清空', 'info');
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('msg');
            msgDiv.textContent = text;
            msgDiv.className = `status-msg status-${type}`;
            setTimeout(() => {
                msgDiv.className = 'status-msg';
            }, 3000);
        }
        
        // ========== 6. 下载皮肤 ==========
        document.getElementById('downloadSkin').addEventListener('click', () => {
            const skinImg = document.getElementById('skinImage');
            if (skinImg.src) {
                const link = document.createElement('a');
                link.download = `mc_skin_${Date.now()}.png`;
                link.href = skinImg.src;
                link.click();
                showMessage('皮肤已下载', 'success');
            }
        });
        
        // ========== 7. 表单提交 ==========
        const form = document.getElementById('generateForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = document.getElementById('prompt').value.trim();
            const style = document.getElementById('style').value;
            
            if (!prompt) {
                showMessage('请填写角色描述', 'error');
                return;
            }
            
            await generateSkin(prompt, style);
        });
        
        document.getElementById('clearHistory').addEventListener('click', clearHistory);
        
        // 初始化加载历史
        loadHistory();
        
        // 监听容器大小变化
        const resizeObserver = new ResizeObserver(() => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
        resizeObserver.observe(container);
    </script>
</body>
</html>
